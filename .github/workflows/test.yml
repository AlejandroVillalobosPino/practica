name: Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: testsecretkey32characterslongxx
          JWT_REFRESH_SECRET: testrefreshsecretkey32charactersxx
          MONGO_URI: mongodb://localhost:27017/test
          PORT: 3000
          NODE_OPTIONS: --max-old-space-size=4096