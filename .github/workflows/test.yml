name: Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: node --experimental-vm-modules node_modules/jest/bin/jest.js --runInBand --forceExit --detectOpenHandles
        env:
          NODE_ENV: test
          CI: true
          JWT_SECRET: testsecretkey32characterslongxx
          JWT_REFRESH_SECRET: testrefreshsecretkey32charactersxx
          MONGO_URI: mongodb://localhost:27017/testdb
          PORT: 3000